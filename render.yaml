services:
  - type: web
    name: claude-notes-mcp
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: AUTH_TOKEN
        generateValue: true      # Render auto-generates a secret value
      - key: NOTES_DIR
        value: /data/notes
    disk:
      name: notes-storage
      mountPath: /data
      sizeGB: 1                  # 1 GB is plenty; free tier supports this
