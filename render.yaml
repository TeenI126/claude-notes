services:
  - type: web
    name: claude-notes-mcp
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: AUTH_TOKEN
        generateValue: true
      - key: GITHUB_TOKEN
        sync: false              # Set this manually in the Render dashboard
      - key: GITHUB_REPO
        sync: false              # e.g. yourusername/claude-notes-data
